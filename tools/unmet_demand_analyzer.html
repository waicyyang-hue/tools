<script>
let clusterData = null, queryData = null;
document.getElementById('file1').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0], 1); });
document.getElementById('file2').addEventListener('change', e => { if (e.target.files[0]) loadFile(e.target.files[0], 2); });

function loadFile(file, num) {
  const box = document.getElementById('box' + num), status = document.getElementById('status' + num);
  status.textContent = '正在读取... ' + (file.size / 1024 / 1024).toFixed(1) + ' MB';
  box.classList.add('loaded');
  const reader = new FileReader();
  reader.onload = function(e) {
    const rows = parseCSV(e.target.result);
    if (num === 1) { clusterData = rows; status.textContent = '✓ 已加载 ' + rows.length + ' 条聚类数据'; }
    else { queryData = rows; status.textContent = '✓ 已加载 ' + rows.length + ' 条搜索词数据'; }
    document.getElementById('analyzeBtn').disabled = !(clusterData && queryData);
  };
  reader.readAsText(file);
}

function parseCSV(text) {
  const rows = [], lines = text.split('\n');
  if (!lines.length) return rows;
  const headers = parseLine(lines[0]);
  for (let i = 1; i < lines.length; i++) { const l = lines[i].trim(); if (!l) continue; const v = parseLine(l); const o = {}; headers.forEach((h, idx) => o[h.trim()] = (v[idx] || '').trim()); rows.push(o); }
  return rows;
}
function parseLine(line) {
  const r = []; let c = '', q = false;
  for (let i = 0; i < line.length; i++) { const ch = line[i]; if (q) { if (ch === '"' && line[i+1] === '"') { c += '"'; i++; } else if (ch === '"') q = false; else c += ch; } else { if (ch === '"') q = true; else if (ch === ',') { r.push(c); c = ''; } else c += ch; } }
  r.push(c); return r;
}

document.getElementById('analyzeBtn').addEventListener('click', analyze);

function analyze() {
  const btn = document.getElementById('analyzeBtn');
  const loading = document.getElementById('loadingMsg');
  const progressBar = document.getElementById('progressBar');
  btn.disabled = true; loading.style.display = 'block'; progressBar.style.display = 'block';
  document.getElementById('progressFill').style.width = '30%';
  setTimeout(() => {
    try {
      const result = runAnalysis();
      document.getElementById('progressFill').style.width = '100%';
      setTimeout(() => { renderResults(result); loading.style.display = 'none'; progressBar.style.display = 'none'; btn.disabled = false; }, 300);
    } catch(e) { loading.textContent = '分析出错: ' + e.message; btn.disabled = false; }
  }, 100);
}

function fmt(n) { if (n >= 1e6) return (n / 1e6).toFixed(2) + 'M'; if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K'; return n.toFixed(0); }
function pct(n) { return (n * 100).toFixed(2) + '%'; }

function makeBar(items, color, maxVal) {
  if (!maxVal) maxVal = items.length > 0 ? items[0][1] : 1;
  return items.map(([label, val]) =>
    '<div class="bar-row"><div class="bar-label" title="' + label + '">' + label + '</div><div class="bar-track"><div class="bar-fill" style="width:' + Math.max(2, val / maxVal * 100) + '%;background:' + color + '">' + fmt(val) + '</div></div></div>'
  ).join('');
}

<script>
function runAnalysis() {
  // --- Cluster analysis ---
  let clusters = [], totalAE = 0, avgPurchaseRate = 0, totalBrandedKW = 0, totalKWCount = 0;
  if (clusterData && clusterData.length > 0) {
    clusters = clusterData.map(c => ({
      ...c, ae: parseFloat(c['Annualized Entitlement']) || 0,
      keywords: (c['Top 10 Keywords'] || '').split(',').map(k => k.trim()).filter(Boolean),
      kwCount: parseInt(c['Keyword Count']) || 0,
      purchaseRate: parseFloat(c['Purchase_rate']) || 0,
      clickCount: parseInt(c['Click Count']) || 0,
      purchaseCount: parseInt(c['Purchase Count']) || 0,
      impressionCount: parseInt(c['Impression Count']) || 0,
      volume: parseInt(c['Volume']) || 0,
      avgClickRate: parseFloat(c['Average Click Rate']) || 0,
      brandedCount: parseInt(c['Branded Keyword Count']) || 0
    })).sort((a, b) => b.ae - a.ae);
    totalAE = clusters.reduce((s, c) => s + c.ae, 0);
    avgPurchaseRate = clusters.reduce((s, c) => s + c.purchaseRate, 0) / clusters.length;
    var avgClickRate = clusters.reduce((s, c) => s + c.avgClickRate, 0) / clusters.length;
    totalBrandedKW = clusters.reduce((s, c) => s + c.brandedCount, 0);
    totalKWCount = clusters.reduce((s, c) => s + c.kwCount, 0);
  }

  const emerging = clusters.filter(c => c.ae > 50000).map(c => ({
    ...c, gapScore: c.purchaseCount > 0 ? c.impressionCount / (c.purchaseCount + 1) : 0
  })).sort((a, b) => b.gapScore - a.gapScore);

  const highPotential = clusters.filter(c => c.avgClickRate > 0.5 && c.purchaseRate < avgPurchaseRate && c.ae > 30000).sort((a, b) => b.ae - a.ae);

  // --- Query-level analysis ---
  const glSet = new Set(), bnSet = new Set();
  const materialMap = {}, colorMap = {}, sizeMap = {}, brandMap = {}, ptMap = {};
  const priceIndicators = { budget: 0, mid: 0, premium: 0, luxury: 0 };
  const styleKeywords = {};
  let queryByAE = [];

  if (queryData && queryData.length > 0) {
    queryByAE = queryData.map(q => ({
      ...q, ae: parseFloat(q['Annualized Entitlement']) || 0,
      clicks: parseInt(q['T4W Click Count']) || 0,
      purchases: parseInt(q['T4W Purchase Count']) || 0,
      impressions: parseInt(q['T4W Impression Count']) || 0
    })).sort((a, b) => b.ae - a.ae);

    queryData.forEach(r => { if (r.GL) glSet.add(r.GL); if (r['Browse Node']) bnSet.add(r['Browse Node']); });

    queryByAE.forEach(q => {
      const ae = q.ae;
      if (q.material) materialMap[q.material] = (materialMap[q.material] || 0) + ae;
      if (q.color) colorMap[q.color] = (colorMap[q.color] || 0) + ae;
      if (q.size) sizeMap[q.size] = (sizeMap[q.size] || 0) + ae;
      if (q.brand) brandMap[q.brand] = (brandMap[q.brand] || 0) + ae;
      if (q['Predicted Product Type']) ptMap[q['Predicted Product Type']] = (ptMap[q['Predicted Product Type']] || 0) + ae;

      const sq = (q['Search Query'] || '').toLowerCase();
      const styleWords = ['realistic','luxury','modern','vintage','boho','rustic','minimalist','elegant',
        'farmhouse','tropical','gothic','romantic','classic','contemporary','bohemian','industrial',
        'cottagecore','aesthetic','hyper realistic','real touch','high end','premium','cheap','budget',
        'bulk','wholesale','clearance','outdoor','indoor','hanging','standing','giant','large','small',
        'mini','tall','short','long','round','heart','arch','wall','table','floor','ceiling',
        'wedding','funeral','christmas','valentine','spring','summer','fall','winter','birthday','party',
        'silk','wood','wooden','paper','dried','fresh','faux','artificial','fake','real',
        'led','light','glow','glitter','crystal','gold','silver','rose gold'];
      styleWords.forEach(w => { if (sq.includes(w)) styleKeywords[w] = (styleKeywords[w] || 0) + ae; });

      if (sq.includes('cheap') || sq.includes('budget') || sq.includes('clearance') || sq.includes('wholesale') || sq.includes('bulk')) priceIndicators.budget += ae;
      else if (sq.includes('luxury') || sq.includes('high end') || sq.includes('hyper realistic')) priceIndicators.luxury += ae;
      else if (sq.includes('real touch') || sq.includes('realistic') || sq.includes('high quality')) priceIndicators.premium += ae;
      else priceIndicators.mid += ae;
    });
  }

  const topStyles = Object.entries(styleKeywords).sort((a, b) => b[1] - a[1]).slice(0, 30);
  const materialStyles = ['silk','wood','wooden','paper','dried','fresh','faux','artificial','fake','real','crystal','gold','silver','rose gold'];
  const formStyles = ['hanging','standing','giant','large','small','mini','tall','short','long','round','heart','arch','wall','table','floor','ceiling'];
  const occasionStyles = ['wedding','funeral','christmas','valentine','spring','summer','fall','winter','birthday','party'];
  const aestheticStyles = ['realistic','luxury','modern','vintage','boho','rustic','minimalist','elegant','farmhouse','tropical','gothic','romantic','classic','contemporary','bohemian','industrial','cottagecore','aesthetic','hyper realistic','real touch','high end','premium'];
  const featureStyles = ['led','light','glow','glitter','bulk','wholesale','clearance','outdoor','indoor','cheap','budget'];
  function filterStyles(keys) { return topStyles.filter(([k]) => keys.includes(k)); }

  return {
    gls: [...glSet], bns: [...bnSet], totalAE, avgPurchaseRate,
    clusters, emerging: emerging.slice(0, 30), highPotential: highPotential.slice(0, 20),
    topPT: Object.entries(ptMap).sort((a, b) => b[1] - a[1]).slice(0, 20),
    topMaterials: Object.entries(materialMap).sort((a, b) => b[1] - a[1]).slice(0, 15),
    topColors: Object.entries(colorMap).sort((a, b) => b[1] - a[1]).slice(0, 15),
    topSizes: Object.entries(sizeMap).sort((a, b) => b[1] - a[1]).slice(0, 15),
    topBrands: Object.entries(brandMap).sort((a, b) => b[1] - a[1]).slice(0, 15),
    topStyles, priceIndicators,
    materialStyleTrends: filterStyles(materialStyles),
    formStyleTrends: filterStyles(formStyles),
    occasionTrends: filterStyles(occasionStyles),
    aestheticTrends: filterStyles(aestheticStyles),
    featureTrends: filterStyles(featureStyles),
    topQueries: queryByAE.slice(0, 50),
    queryByAE: queryByAE,
    queryCount: queryData ? queryData.length : 0,
    clusterCount: clusterData ? clusterData.length : 0,
    hasCluster: !!(clusterData && clusterData.length > 0),
    hasQuery: !!(queryData && queryData.length > 0),
    brandRatio: totalKWCount > 0 ? totalBrandedKW / totalKWCount : 0,
    totalBrandedKW: totalBrandedKW,
    totalKWCount: totalKWCount,
    avgClickRate: avgClickRate || 0
  };
}
</script>

    var priceMax = Math.max(r.priceIndicators.budget, r.priceIndicators.mid, r.priceIndicators.premium, r.priceIndicators.luxury);
    html += '<div class="bar-chart">' + makeBar([
      ['💎 高端 $' + tierPremium + '+ (luxury/hyper realistic)', r.priceIndicators.luxury],
      ['⭐ 中高端 $' + tierHigh + '-$' + tierPremium + ' (real touch/realistic)', r.priceIndicators.premium],
      ['📦 中端 $' + tierLow + '-$' + tierHigh + ' (常规搜索)', r.priceIndicators.mid],
      ['🏷️ 经济型 <$' + tierLow + ' (cheap/bulk/clearance)', r.priceIndicators.budget]
    ], 'linear-gradient(90deg,#facc15,#fde047)', priceMax) + '</div>';
    html += '<p style="margin-top:8px">';
    if (r.priceIndicators.luxury + r.priceIndicators.premium > r.priceIndicators.budget) {
      html += '数据显示消费者对<span class="highlight">中高端及以上</span>产品有较强需求，建议重点布局品质感强的产品线。';
    } else {
      html += '数据显示<span class="highlight">经济型</span>需求占比较大，建议提供性价比产品线。';
    }
    html += ' 中端常规需求占比 <span class="highlight">' + (totalPAE > 0 ? (r.priceIndicators.mid / totalPAE * 100).toFixed(1) : 0) + '%</span>，是最大的基本盘。</p>';
    html += '<p style="color:#64748b;font-size:11px;margin-top:6px">* 价格区间为基于搜索词需求分布推断的参考值，实际定价请结合竞品分析。</p>';
    html += '</div>';

    // 场景
    html += '<div class="rec-box"><h4>🎄 场景/节日趋势</h4><p>场景与节日搜索趋势: ' + (r.occasionTrends.map(function(item){ return '<span class="highlight">' + item[0] + '</span> (' + fmt(item[1]) + ')'; }).join(', ') || '暂无明确数据') + '</p>';
    if (r.occasionTrends.length > 0) html += '<div class="bar-chart">' + makeBar(r.occasionTrends, 'linear-gradient(90deg,#f97316,#fb923c)') + '</div>';
    html += '</div>';

    // 功能
    html += '<div class="rec-box"><h4>🔧 功能特性趋势</h4><p>消费者关注的功能特性: ' + (r.featureTrends.map(function(item){ return '<span class="highlight">' + item[0] + '</span> (' + fmt(item[1]) + ')'; }).join(', ') || '暂无明确数据') + '</p>';
    if (r.featureTrends.length > 0) html += '<div class="bar-chart">' + makeBar(r.featureTrends, 'linear-gradient(90deg,#06b6d4,#22d3ee)') + '</div>';
    html += '</div>';

    html += '</div>'; // close 新品建议 card

    // 品牌
    html += '<div class="card"><h2>🏢 品牌搜索热度</h2>';
    html += '<p style="color:#94a3b8;font-size:13px;margin-bottom:16px">消费者主动搜索的品牌（品牌词需求量）</p>';
    html += '<p style="color:#64748b;font-size:12px;margin-bottom:12px"><strong style="color:#94a3b8">对卖家的意义：</strong>品牌搜索量高说明消费者已有品牌认知，可作为竞品研究对象；品牌词整体占比低则说明类目品牌集中度低，新品牌有机会。排名靠前的品牌是该类目标杆，建议研究其产品线、定价和评价，寻找差异化切入点。</p>';
    if (r.topBrands.length > 0) { html += '<div class="bar-chart">' + makeBar(r.topBrands, 'linear-gradient(90deg,#14b8a6,#2dd4bf)') + '</div>'; }
    else { html += '<p style="color:#64748b">数据中品牌标注较少，说明该类目品牌集中度低，新品牌有机会。</p>'; }
    html += '</div>';

    // Top搜索词
    html += '<div class="card"><h2>🔎 Top 搜索词明细</h2><div class="table-wrap" style="max-height:500px"><table>';
    html += '<thead><tr><th>#</th><th>搜索词</th><th>年化需求</th><th>点击数</th><th>购买数</th><th>曝光量</th><th>产品类型</th><th>材质</th><th>颜色</th><th>尺寸</th></tr></thead><tbody>';
    r.topQueries.forEach(function(q, i) {
      html += '<tr><td>' + (i+1) + '</td><td>' + (q['Search Query']||'') + '</td><td>' + fmt(q.ae) + '</td><td>' + fmt(q.clicks) + '</td><td>' + fmt(q.purchases) + '</td><td>' + fmt(q.impressions) + '</td><td>' + (q['Predicted Product Type']||'-') + '</td><td>' + (q.material||'-') + '</td><td>' + (q.color||'-') + '</td><td>' + (q.size||'-') + '</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  el.innerHTML = html;
  el.scrollIntoView({ behavior: 'smooth' });
}
</script>
</body>
</html>
